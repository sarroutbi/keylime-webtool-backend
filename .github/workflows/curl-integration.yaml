---
name: Curl Integration Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  curl-integration-tests:
    name: Curl end-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install mockoon-cli
        run: npm install -g @mockoon/cli
      - name: Run curl integration tests
        run: bash tests/curl_integration_test.sh
